<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나는 어떤 학교생활 위험 유형일까?</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:"Malgun Gothic",sans-serif;
background:linear-gradient(135deg,#dbeafe,#f0f9ff);
margin:0;
padding:20px;
min-height:100vh;
}

.container{
max-width:850px;
margin:auto;
background:white;
padding:35px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.12);
}

h1{
text-align:center;
font-size:40px;
margin-bottom:10px;
color:#1e3a8a;
}

.question{
background:#f8fafc;
padding:20px;
border-radius:18px;
margin:20px 0;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
transition:0.2s;
}

.question:hover{
transform:translateY(-2px);
}

.question h3{
margin-top:0;
color:#2563eb;
}

label{
display:block;
padding:12px;
margin:10px 0;
border-radius:12px;
cursor:pointer;
transition:0.2s;
}

label:hover{
background:#dbeafe;
}

input[type="radio"]{
margin-right:10px;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:#2563eb;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#1d4ed8;
transform:translateY(-2px);
}

#result{
margin-top:30px;
padding:30px;
border-radius:20px;
display:none;
animation:fadeUp .5s ease;
}

.result-box{
background:linear-gradient(135deg,#eff6ff,#dbeafe);
border-left:10px solid #2563eb;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

#result h2{
font-size:40px;
text-align:center;
margin-top:0;
color:#1e3a8a;
}

#result p{
font-size:18px;
line-height:1.8;
}

.intro{
text-align:center;
font-size:18px;
color:#64748b;
margin-bottom:30px;
}

.shareBtn{
margin-top:20px;
background:#10b981;
}

.shareBtn:hover{
background:#059669;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="container">

<h1>🏫 학교생활 안전 유형 검사</h1>

<p class="intro">
당신의 생활 습관 속에는 어떤 건강·안전 위험 요소가 숨어 있을까요?<br>
총 10문항 · 약 1분 소요
</p>
    
<form id="quiz">

<div class="question">
<h3>1. 쉬는 시간에 가장 많이 하는 행동은?</h3>
<label><input type="radio" name="q1" value="A"> A. 책상에 엎드려 잔다</label>
<label><input type="radio" name="q1" value="B"> B. 이어폰으로 음악을 듣는다</label>
<label><input type="radio" name="q1" value="C"> C. 친구들과 돌아다닌다</label>
<label><input type="radio" name="q1" value="D"> D. 스트레칭을 한다</label>
</div>

<div class="question">
<h3>2. 버스를 타면 보통?</h3>
<label><input type="radio" name="q2" value="A"> A. 앉으면 바로 잔다</label>
<label><input type="radio" name="q2" value="B"> B. 음악을 듣는다</label>
<label><input type="radio" name="q2" value="C"> C. 서서 가다가 휘청거리는 경우가 많다</label>
<label><input type="radio" name="q2" value="D"> D. 손잡이를 잘 잡고 이동한다</label>
</div>

<div class="question">
<h3>3. 이어폰 음량은?</h3>
<label><input type="radio" name="q3" value="A"> A. 거의 사용 안 함</label>
<label><input type="radio" name="q3" value="B"> B. 크게 듣는 편</label>
<label><input type="radio" name="q3" value="C"> C. 상황에 따라 다름</label>
<label><input type="radio" name="q3" value="D"> D. 적당한 음량 유지</label>
</div>

<div class="question">
<h3>4. 피곤할 때 나는?</h3>
<label><input type="radio" name="q4" value="A"> A. 엎드려 잔다</label>
<label><input type="radio" name="q4" value="B"> B. 음악을 듣는다</label>
<label><input type="radio" name="q4" value="C"> C. 걸어 다닌다</label>
<label><input type="radio" name="q4" value="D"> D. 가볍게 스트레칭한다</label>
</div>

<div class="question">
<h3>5. 버스가 급정거하면?</h3>
<label><input type="radio" name="q5" value="A"> A. 자다가 깬다</label>
<label><input type="radio" name="q5" value="B"> B. 이어폰 때문에 늦게 눈치챈다</label>
<label><input type="radio" name="q5" value="C"> C. 휘청거린다</label>
<label><input type="radio" name="q5" value="D"> D. 중심을 잘 잡는다</label>
</div>

<div class="question">
<h3>6. 수업 중 가장 자주 불편한 부위는?</h3>
<label><input type="radio" name="q6" value="A"> A. 목이나 허리</label>
<label><input type="radio" name="q6" value="B"> B. 귀</label>
<label><input type="radio" name="q6" value="C"> C. 다리</label>
<label><input type="radio" name="q6" value="D"> D. 특별히 없다</label>
</div>

<div class="question">
<h3>7. 등하교 중 가장 많이 하는 행동은?</h3>
<label><input type="radio" name="q7" value="A"> A. 잠을 잔다</label>
<label><input type="radio" name="q7" value="B"> B. 음악을 듣는다</label>
<label><input type="radio" name="q7" value="C"> C. 서서 이동한다</label>
<label><input type="radio" name="q7" value="D"> D. 주변을 살피며 이동한다</label>
</div>

<div class="question">
<h3>8. 쉬는 시간에 가장 필요한 것은?</h3>
<label><input type="radio" name="q8" value="A"> A. 수면</label>
<label><input type="radio" name="q8" value="B"> B. 음악</label>
<label><input type="radio" name="q8" value="C"> C. 친구들과 이동</label>
<label><input type="radio" name="q8" value="D"> D. 스트레칭</label>
</div>

<div class="question">
<h3>9. 버스에서 자리가 없다면?</h3>
<label><input type="radio" name="q9" value="A"> A. 기대서 잔다</label>
<label><input type="radio" name="q9" value="B"> B. 이어폰을 끼고 음악을 듣는다</label>
<label><input type="radio" name="q9" value="C"> C. 한 손으로만 손잡이를 잡는다</label>
<label><input type="radio" name="q9" value="D"> D. 두 발로 균형을 잡고 선다</label>
</div>

<div class="question">
<h3>10. 건강한 학교생활을 위해 가장 중요한 것은?</h3>
<label><input type="radio" name="q10" value="A"> A. 충분한 휴식</label>
<label><input type="radio" name="q10" value="B"> B. 적절한 음량 사용</label>
<label><input type="radio" name="q10" value="C"> C. 안전한 이동 습관</label>
<label><input type="radio" name="q10" value="D"> D. 균형 잡힌 생활 습관</label>
</div>
</form>
<button type="button" onclick="showResult()">결과 보기</button>
<div id="result" class="result-box"></div>

<button class="shareBtn" onclick="copyLink()">
📤 친구들에게 공유하기
</button>

<script>
function showResult(){

let scores = {
A:0,
B:0,
C:0,
D:0
};

for(let i=1;i<=10;i++){
let answer=document.querySelector('input[name="q'+i+'"]:checked');

if(!answer){
alert("모든 문항에 답해주세요!");
return;
}

scores[answer.value]++;
}

let type = Object.keys(scores).reduce((a,b)=>
scores[a] > scores[b] ? a : b
);

let result = document.getElementById("result");

if(type==="A"){
result.innerHTML=`
<h2>😴 ZZZZ형</h2>
<p><b>책상 취침형</b></p>
<p>엎드려 자는 습관이 많은 유형입니다. 목, 허리, 팔꿈치 신경에 부담이 갈 수 있으므로 바른 자세로 휴식하는 것이 좋습니다. 몸에 부담이 가지 않도록 자는 방법은 3-8 안전부 신문을 참고해주세요!</p>
`;
}

if(type==="B"){
result.innerHTML=`
<h2>🎧 Music is my life형</h2>
<p><b>이어폰 과몰입형</b></p>
<p>음악과 함께하는 시간이 많습니다. 장시간 고음량 사용은 소음성 난청 위험을 높일 수 있습니다. 이어폰 사용의 위험성과 해결 방안을 더 알고싶으시다면 3-8 안전부 신문을 참고해주세요!</p>
`;
}

if(type==="C"){
result.innerHTML=`
<h2>🚌 SWAY형</h2>
<p><b>버스 곡예사형</b></p>
<p>이동 중 활동이 많은 유형입니다. 급정거 시 균형을 잃지 않도록 손잡이를 잘 잡는 습관이 필요합니다. 자세한 버스에서 넘어지지 않는 방법이 궁금하다면 3-8 안전부 신문을 참고해주세요!</p>
`;
}

if(type==="D"){
result.innerHTML=`
<h2>⭐ SAFE형</h2>
<p><b>안전 모범형</b></p>
<p>건강과 안전을 잘 관리하는 유형입니다. 좋은 생활 습관을 유지하고 주변 친구들에게도 알려주세요.</p>
`;
}

result.style.display="block";
window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});
}
function copyLink(){
navigator.clipboard.writeText(window.location.href);
alert("링크가 복사되었습니다!");
}

</script>
</body>
</html>
